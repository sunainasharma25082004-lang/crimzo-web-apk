# Render Static Site — https://render.com/docs/static-sites
staticSites:
  - name: crimzo
    rootDir: frontend
    buildCommand: git lfs pull && npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    headers:
      - path: /crmizo.apk
        name: Content-Type
        value: application/vnd.android.package-archive
      - path: /crmizo.apk
        name: Content-Disposition
        value: attachment; filename="crmizo.apk"
    routes:
      - type: rewrite
        source: /crmizo.apk
        destination: /crmizo.apk
      - type: rewrite
        source: /*
        destination: /index.html