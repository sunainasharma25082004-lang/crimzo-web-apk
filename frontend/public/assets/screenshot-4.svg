<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 560" fill="none">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
    <linearGradient id="profileGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8242a"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ff3b42"/>
    </linearGradient>
    <linearGradient id="bannerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e8242a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ff3b42" stop-opacity="0.2"/>
    </linearGradient>
  </defs>
  <rect width="280" height="560" fill="url(#bg4)"/>
  <rect x="0" y="0" width="280" height="44" fill="rgba(0,0,0,0.3)"/>
  <text x="20" y="28" fill="#94a3b8" font-family="Arial,sans-serif" font-size="12">9:41</text>
  <!-- Banner -->
  <rect x="0" y="44" width="280" height="100" fill="url(#bannerGrad)"/>
  <!-- Avatar -->
  <circle cx="140" cy="144" r="44" fill="url(#profileGrad)" stroke="#050505" stroke-width="4"/>
  <circle cx="140" cy="130" r="18" fill="rgba(255,255,255,0.3)"/>
  <ellipse cx="140" cy="158" rx="22" ry="14" fill="rgba(255,255,255,0.2)"/>
  <!-- Name & bio -->
  <text x="140" y="210" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="18" font-weight="bold">Sarah_Live</text>
  <text x="140" y="230" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="11">Live streamer &amp; creator ✨</text>
  <!-- Stats -->
  <text x="60" y="268" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="16" font-weight="bold">12.5K</text>
  <text x="60" y="284" text-anchor="middle" fill="#64748b" font-family="Arial,sans-serif" font-size="10">Followers</text>
  <text x="140" y="268" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="16" font-weight="bold">847</text>
  <text x="140" y="284" text-anchor="middle" fill="#64748b" font-family="Arial,sans-serif" font-size="10">Following</text>
  <text x="220" y="268" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="16" font-weight="bold">156</text>
  <text x="220" y="284" text-anchor="middle" fill="#64748b" font-family="Arial,sans-serif" font-size="10">Lives</text>
  <!-- Buttons -->
  <rect x="16" y="300" width="120" height="36" rx="18" fill="url(#profileGrad)"/>
  <text x="52" y="323" fill="white" font-family="Arial,sans-serif" font-size="12" font-weight="bold">Edit Profile</text>
  <rect x="144" y="300" width="120" height="36" rx="18" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)"/>
  <text x="172" y="323" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="12">Share</text>
  <!-- Tabs -->
  <text x="50" y="368" fill="#ff3b42" font-family="Arial,sans-serif" font-size="12" font-weight="bold">Posts</text>
  <text x="120" y="368" fill="#64748b" font-family="Arial,sans-serif" font-size="12">Lives</text>
  <text x="190" y="368" fill="#64748b" font-family="Arial,sans-serif" font-size="12">Saved</text>
  <rect x="30" y="374" width="40" height="2" rx="1" fill="#ff3b42"/>
  <!-- Grid -->
  <rect x="16" y="388" width="78" height="78" rx="12" fill="#141414"/>
  <rect x="16" y="388" width="78" height="78" rx="12" fill="url(#profileGrad)" opacity="0.3"/>
  <rect x="101" y="388" width="78" height="78" rx="12" fill="#141414"/>
  <rect x="101" y="388" width="78" height="78" rx="12" fill="#ffffff" opacity="0.2"/>
  <rect x="186" y="388" width="78" height="78" rx="12" fill="#141414"/>
  <rect x="186" y="388" width="78" height="78" rx="12" fill="#ff3b42" opacity="0.2"/>
  <rect x="16" y="474" width="78" height="78" rx="12" fill="#141414"/>
  <rect x="101" y="474" width="78" height="78" rx="12" fill="#141414"/>
  <rect x="186" y="474" width="78" height="78" rx="12" fill="#141414"/>
</svg>