<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 560" fill="none">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0808"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="liveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e8242a"/>
      <stop offset="100%" stop-color="#ff3b42"/>
    </linearGradient>
    <linearGradient id="avatarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#ff3b42"/>
    </linearGradient>
  </defs>
  <rect width="280" height="560" fill="url(#bg1)"/>
  <!-- Status bar -->
  <rect x="0" y="0" width="280" height="44" fill="rgba(0,0,0,0.3)"/>
  <text x="20" y="28" fill="#94a3b8" font-family="Arial,sans-serif" font-size="12">9:41</text>
  <!-- Live stream area -->
  <rect x="0" y="44" width="280" height="340" fill="#141414"/>
  <circle cx="140" cy="214" r="60" fill="url(#avatarGrad)" opacity="0.6"/>
  <circle cx="140" cy="190" r="28" fill="url(#avatarGrad)"/>
  <ellipse cx="140" cy="250" rx="35" ry="20" fill="url(#avatarGrad)" opacity="0.5"/>
  <!-- Live badge -->
  <rect x="16" y="60" width="72" height="28" rx="14" fill="#ef4444"/>
  <circle cx="30" cy="74" r="4" fill="white"/>
  <text x="42" y="79" fill="white" font-family="Arial,sans-serif" font-size="11" font-weight="bold">LIVE</text>
  <!-- Viewer count -->
  <rect x="190" y="60" width="74" height="28" rx="14" fill="rgba(0,0,0,0.5)"/>
  <text x="210" y="79" fill="white" font-family="Arial,sans-serif" font-size="11">👁 2.4K</text>
  <!-- Streamer info -->
  <rect x="16" y="360" width="248" height="56" rx="16" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)"/>
  <circle cx="44" cy="388" r="18" fill="url(#avatarGrad)"/>
  <text x="72" y="384" fill="white" font-family="Arial,sans-serif" font-size="13" font-weight="bold">Sarah_Live</text>
  <text x="72" y="402" fill="#94a3b8" font-family="Arial,sans-serif" font-size="11">12.5K followers</text>
  <rect x="200" y="372" width="52" height="32" rx="16" fill="url(#liveGrad)"/>
  <text x="212" y="393" fill="white" font-family="Arial,sans-serif" font-size="11" font-weight="bold">Follow</text>
  <!-- Chat messages -->
  <rect x="0" y="420" width="280" height="100" fill="rgba(0,0,0,0.2)"/>
  <text x="16" y="442" fill="#ff3b42" font-family="Arial,sans-serif" font-size="11" font-weight="bold">Alex99:</text>
  <text x="68" y="442" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="11">Amazing stream! 🔥</text>
  <text x="16" y="462" fill="#ff6b6b" font-family="Arial,sans-serif" font-size="11" font-weight="bold">Mike_J:</text>
  <text x="68" y="462" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="11">Sent a gift 💎</text>
  <text x="16" y="482" fill="#ff5252" font-family="Arial,sans-serif" font-size="11" font-weight="bold">LunaStar:</text>
  <text x="82" y="482" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="11">Love this content!</text>
  <!-- Bottom nav -->
  <rect x="0" y="520" width="280" height="40" fill="rgba(0,0,0,0.4)"/>
  <rect x="100" y="528" width="80" height="28" rx="14" fill="rgba(255,255,255,0.08)"/>
  <text x="115" y="547" fill="#64748b" font-family="Arial,sans-serif" font-size="11">Say something...</text>
  <circle cx="250" cy="542" r="14" fill="url(#liveGrad)"/>
  <text x="244" y="547" fill="white" font-size="12">🎁</text>
</svg>